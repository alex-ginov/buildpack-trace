worker_processes 1;
daemon off;

events {
    worker_connections 1024;
}

http {
    default_type application/octet-stream;
    
    # Types MIME de base dont nous avons besoin
    types {
        text/html                                        html htm shtml;
        text/css                                         css;
        text/xml                                         xml;
        application/javascript                           js;
        application/json                                 json;
        image/png                                        png;
        image/jpeg                                       jpg jpeg;
        image/gif                                        gif;
        image/svg+xml                                    svg svgz;
    }
    
    # Logs pour le débogage
    access_log /tmp/nginx-access.log;
    error_log /tmp/nginx-error.log;
    
    upstream tempo_backend {
        server 127.0.0.1:3200;  # Tempo écoute en interne sur 3200
    }
    
    server {
        listen ${PORT};  # Port Scalingo
        server_name _;
        
        # Proxy pour l'UI Tempo
        location / {
            proxy_pass http://tempo_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        # Proxy spécifique pour OTLP
        location /v1/traces {
            proxy_pass http://tempo_backend/v1/traces;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Content-Type application/json;
            
            # CORS pour OTLP
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*';
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
                add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range';
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                add_header 'Content-Length' 0;
                return 204;
            }
            if ($request_method = 'POST') {
                add_header 'Access-Control-Allow-Origin' '*';
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
                add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range';
            }
        }
        
        # Proxy pour l'API de recherche
        location /api/ {
            proxy_pass http://tempo_backend/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
