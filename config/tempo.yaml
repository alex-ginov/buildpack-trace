# Configuration du serveur
server:
  http_listen_address: "127.0.0.1"  # Écoute en local seulement
  http_listen_port: 3200            # Port interne fixe
  log_level: info

# Configuration de l'ingestion des traces
ingester:
  trace_idle_period: "30s"
  max_block_bytes: 1000000
  max_block_duration: "5m"
  lifecycler:
    ring:
      kvstore:
        store: inmemory

# Configuration du stockage
storage:
  trace:
    backend: local
    local:
      path: /tmp/tempo-data/blocks
    wal:
      path: /tmp/tempo-data/wal

# Configuration OTLP simplifiée
distributor:
  receivers:
    otlp:
      protocols:
        http: {}  # Configuration simplifiée, le routage est géré par nginx

# Configuration du query frontend et des composants de recherche
query_frontend: {}

compactor:
  compaction:
    block_retention: 24h

storage:
  trace:
    backend: local
    local:
      path: /tmp/tempo-data/blocks
    pool:
      max_workers: 100
      queue_depth: 10000

# Configuration du compresseur
compactor:
  compaction:
    block_retention: 24h
    compacted_block_retention: 1h

